name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quantsage
          POSTGRES_PASSWORD: change_me_strong
          POSTGRES_DB: quantsage
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install scikit-learn xgboost

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://quantsage:change_me_strong@localhost:5432/quantsage
          REDIS_URL: redis://localhost:6379/0
          MASTER_KEY: dGVzdC1tYXN0ZXIta2V5LWZvci1jaS1zZXNzaW9uLTAwMDAwMA==
          JWT_SECRET_KEY: ci-secret-do-not-use-in-production
          ADMIN_PASSWORD: ci-test-password
        run: pytest -v --tb=short

      - name: Ruff lint
        working-directory: backend
        run: pip install ruff && ruff check quantsage

      - name: Alembic migration check
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://quantsage:change_me_strong@localhost:5432/quantsage
        run: |
          pip install alembic
          alembic upgrade head

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
